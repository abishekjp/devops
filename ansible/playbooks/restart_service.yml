# FILE 16: ansible/playbooks/restart_service.yml
# Phase 6 — Service Restart Remediation Playbook
# Triggered by AI auto-remediation for service_down or
# high_memory alerts. Gracefully restarts the target service.
# Target: Ubuntu 22.04
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
---
- name: Service Restart — Graceful Recovery (Safe & Idempotent)
  hosts: "{{ target | default('webservers') }}"
  become: yes

  vars:
    service_name: "{{ service_name | default('nginx') }}"

  tasks:

    # ── Gather service information ─────────────────────────
    - name: Gather service facts
      service_facts:

    # ── Validate service exists ───────────────────────────
    - name: Check if service exists
      fail:
        msg: "❌ Service {{ service_name }} not found"
      when: "'{{ service_name }}.service' not in ansible_facts.services"

    # ── Restart service safely ────────────────────────────
    - name: Restart service
      service:
        name: "{{ service_name }}"
        state: restarted

    # ── Wait for stabilization ────────────────────────────
    - name: Wait for service to stabilize
      pause:
        seconds: 3

    # ── Verify service status ─────────────────────────────
    - name: Check service status
      command: systemctl is-active {{ service_name }}
      register: status
      changed_when: false

    - name: Show service status
      debug:
        msg: >
          {{
            "✅ Service is running"
            if status.stdout == "active"
            else "❌ Service restart failed"
          }}
