# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# FILE 13: k8s/service.yaml
# Phase 5 — Kubernetes Service
# NodePort service exposing the app on port 30007
# Routes external traffic to the myapp deployment
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: myapp-prod
  labels:
    app: myapp
    environment: production
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - protocol: TCP
      port: 80            # Service port (cluster-internal)
      targetPort: 3000    # Container port
      nodePort: 30007     # External access port
