version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: ia3-project
    user: root
    privileged: true

    ports:
      - "9090:8080"
      - "50000:50000"

    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

    command: >
      bash -c "apt-get update && apt-get install -y docker.io curl && curl -fsSL https://deb.nodesource.com/setup_18.x | bash - && apt-get install -y nodejs && curl -LO \"https://dl.k8s.io/release/$$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl\" && chmod +x kubectl && mv kubectl /usr/local/bin/ && /usr/local/bin/jenkins.sh"

volumes:
  jenkins_data:
